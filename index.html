<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIII</title>
    <style>
        /* Base Setup & Reset */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Perfect scroll lock */
            background-color: #020603;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Pure CSS Tech Layout Architecture */
        .page-container {
            display: table;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 5;
        }

        .center-cell {
            display: table-cell;
            vertical-align: middle;
            text-align: center;
            padding: 24px;
        }

        /* 100% Responsive Content Container */
        .main-card {
            display: inline-block;
            width: 100%;
            max-width: 780px;
            margin: 0 auto;
        }

        /* Cyberpunk Tech Background Grid */
        .matrix-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 96, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 96, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }

        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vw;
            max-width: 600px;
            max-height: 600px;
            background: radial-gradient(circle, rgba(0, 242, 96, 0.06) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: 2;
            pointer-events: none;
        }

        /* Custom Live Image Logo Integration */
        .logo-box {
            margin-bottom: 24px;
        }

        .logo-img {
            width: 100%;
            max-width: 130px;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(0, 242, 96, 0.45));
            animation: techPulse 4s infinite ease-in-out;
        }

        /* Typography & Headings */
        .brand-heading {
            font-size: clamp(20pt, 5vw, 30pt);
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffffff 40%, #00f260 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Pure CSS Layout Structure for Content Box */
        .tagline-wrapper {
            margin: 24px auto;
            border-left: 2px solid #00f260;
            border-right: 2px solid #00f260;
            padding: 20px;
            background: rgba(0, 20, 8, 0.4);
            border-radius: 6px;
            box-shadow: inset 0 0 15px rgba(0, 242, 96, 0.05);
        }

        .business-statement {
            font-size: clamp(11pt, 3vw, 14pt);
            line-height: 1.6;
            color: #d8d8d8;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .highlight-text {
            color: #00f260;
            font-weight: 600;
            text-shadow: 0 0 8px rgba(0, 242, 96, 0.25);
        }

        /* Operational System Badge */
        .system-status {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(0, 242, 96, 0.08);
            border: 1px solid rgba(0, 242, 96, 0.25);
            border-radius: 30px;
            font-size: clamp(8pt, 2vw, 9pt);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #00f260;
            margin-bottom: 20px;
        }

        /* Modern Action Trigger Element */
        .action-block {
            margin-top: 32px;
        }

        .btn-launch {
            display: inline-block;
            padding: 12px 32px;
            font-size: clamp(9pt, 2vw, 11pt);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #020603;
            background: linear-gradient(90deg, #00c6ff, #00f260);
            border: none;
            border-radius: 4px;
            text-decoration: none;
            box-shadow: 0 0 15px rgba(0, 242, 96, 0.25);
            transition: all 0.3s ease;
        }

        /* Animations */
        @keyframes techPulse {
            0%, 100% { filter: drop-shadow(0 0 12px rgba(0, 242, 96, 0.4)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 22px rgba(0, 242, 96, 0.6)); transform: scale(1.04); }
        }
    </style>
</head>
<body>

    <div class="matrix-grid"></div>
    <div class="ambient-glow"></div>

    <div class="page-container">
        <div class="center-cell">
            <div class="main-card">
                
                <!-- Active System Identifier -->
                <div class="system-status">System Operational</div>

                <!-- Live Brand Logo Element -->
                <div class="logo-box">
                    <img src="https://niii.xyz/images/logo.png" alt="NIII Logo" class="logo-img">
                </div>

                <!-- Main Branding Heading -->
                <h1 class="brand-heading">NIII LABS</h1>

                <!-- Premium Universal Converting Tagline -->
                <div class="tagline-wrapper">
                    <p class="business-statement">
                        We engineer <span class="highlight-text">high-performance digital architecture</span> to automate your operations, amplify your digital scale, and transform complex workflows into <span class="highlight-text">profitable business assets</span>.
                    </p>
                </div>

                <!-- CTA Trigger -->
                <div class="action-block">
                    <a href="mailto:contact@niii.xyz" class="btn-launch">Initialize Project</a>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
